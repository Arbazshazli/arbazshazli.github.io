<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbaz Shazli - WhatsApp Direct</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {margin:0;padding:0;box-sizing:border-box}
    body {
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px
    }
    .card {
      background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);
      max-width:450px;width:100%;overflow:hidden;animation:slideUp 0.5s ease
    }
    @keyframes slideUp {
      from {opacity:0;transform:translateY(30px)}
      to {opacity:1;transform:translateY(0)}
    }
    .header {
      background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);
      padding:30px 20px;text-align:center;color:white
    }
    .header i {font-size:50px;margin-bottom:10px}
    .header h1 {font-size:24px;font-weight:600;margin-bottom:5px}
    .header p {font-size:14px;opacity:0.9}
    .body {padding:30px 25px}
    .input-group {margin-bottom:20px}
    .input-group label {
      display:block;font-size:13px;font-weight:600;color:#333;
      margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px
    }
    .input-field {
      display:flex;align-items:center;background:#f5f5f5;
      border-radius:12px;padding:0 15px;border:2px solid transparent;
      transition:all 0.3s ease
    }
    .input-field:focus-within {
      background:white;border-color:#25D366;
      box-shadow:0 0 0 4px rgba(37,211,102,0.1)
    }
    .input-field i {color:#25D366;font-size:18px;margin-right:12px}
    .input-field input, .input-field textarea {
      flex:1;border:none;background:transparent;padding:14px 0;
      font-size:15px;outline:none;color:#333;font-family:inherit
    }
    .input-field textarea {resize:none;min-height:80px}
    .btn {
      width:100%;background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);
      color:white;border:none;padding:16px;border-radius:12px;
      font-size:16px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all 0.3s ease;box-shadow:0 4px 15px rgba(37,211,102,0.4)
    }
    .btn:hover {
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(37,211,102,0.5)
    }
    .btn:active {transform:translateY(0)}
    .footer {
      text-align:center;padding:20px;font-size:12px;color:#999;
      border-top:1px solid #eee
    }
    .footer a {color:#25D366;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <i class="fab fa-whatsapp"></i>
      <h1>WhatsApp Direct Chat</h1>
      <p>Send message without saving number</p>
    </div>
    
    <div class="body">
      <div class="input-group">
        <label>Country Code + Number</label>
        <div class="input-field">
          <i class="fas fa-phone"></i>
          <input type="tel" id="number" placeholder="923001234567" value="92">
        </div>
      </div>

      <div class="input-group">
        <label>Your Message</label>
        <div class="input-field">
          <i class="fas fa-comment-dots"></i>
          <textarea id="message" placeholder="Type your message here...">Hello! Contacting you from Arbaz Shazli Tool</textarea>
        </div>
      </div>

      <button class="btn" onclick="openChat()">
        <i class="fab fa-whatsapp"></i>
        Open in WhatsApp
      </button>
    </div>

    <div class="footer">
      Made with ❤️ by <a href="https://github.com/azshazli">Arbaz Shazli</a>
    </div>
  </div>

  <script>
    function openChat() {
      let num = document.getElementById('number').value.replace(/[^0-9]/g, '');
      let msg = document.getElementById('message').value;
      
      if(num.length < 10) {
        alert('Please enter a valid number with country code');
        return;
      }
      
      let url = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
    }

    document.getElementById('number').addEventListener('keypress', function(e) {
      if(e.key === 'Enter') openChat();
    });
  </script>
</body>
</html>
